backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
    - name: products
    label: Produits
    folder: products
    create: true
    fields:
            - {label: Nom FR, name: nom_fr, widget: string}
            - {label: Prix, name: prix, widget: number}
            - {label: Photo, name: image, widget: image}
            - {label: Categorie, name: categorie, widget: string}
