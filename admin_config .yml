backend:
  name: git-gateway
  branch: main
media_folder: images/uploads
public_folder: /images/uploads
collections:
    - name: products
    label: Produits
    folder: products
    create: true
    fields:
            - {label: Nom FR, name: nameFR, widget: string}
            - {label: Prix, name: price, widget: number}
            - {label: Photo, name: image, widget: image}
            - {label: Categorie, name: category, widget: select, options: [abaya, robe, sac]}